pre-commit:
  parallel: true
  setup:
    - run: bash scripts/lefthook/require-dev-shell.sh
  commands:
    narrow-language-nix: {}
    narrow-language-markdown: {}
    narrow-language-nix-compact:
      skip: true
    narrow-language-shell-compact:
      skip: true
    narrow-language-markdown-compact:
      skip: true
    narrow-language-other-compact:
      skip: true
    narrow-language-nix-freeze:
      skip: true
    narrow-language-shell-freeze:
      skip: true
    narrow-language-markdown-freeze:
      skip: true
    narrow-language-other-freeze:
      skip: true
    narrow-language-other:
      exclude:
        - "*.nix"
        - "*.sh"
        - "*.bats"
        - "*.py"
        - "*.rb"
        - "*.js"
        - "*.jsx"
        - "*.ts"
        - "*.tsx"
        - "*.erb"
        - "*.hcl"
        - "*.tf"
        - "*.css"
        - "*.scss"
        - "*.md"
        - "*.dic"
        - "flake.lock"
    tdd-order-bats:
      env:
        LEFTHOOK_TDD_SPEC_DIR: tests/unit
        LEFTHOOK_TDD_SRC_STRIP: ""
    bats-changed:
      glob: "*.{sh,bats}"
      timeout: 60s
      exclude:
        - "build.sh"
        - "tests/unit/build.bats"
        - "tests/integration/"
      run: lefthook-bats-changed {staged_files}
    ascii-only:
      exclude:
        - "SPEC.md"
        - "flake.lock"
    nix-flake-eval:
      env:
        LEFTHOOK_NIX_FLAKE_EVAL_ATTR: ".#darwinConfigurations.macos-arm.system"
    execute-permissions:
      env:
        LEFTHOOK_EXECUTE_PERMISSIONS_ALLOWED: '^(\\./)?scripts/|^(\\./)?bin/'

pre-push:
  parallel: true
  setup:
    - run: >-
        bash scripts/lefthook/require-dev-shell.sh
        lefthook-vulnix-scan
        lefthook-narrow-language
  commands:
    narrow-language-nix: {}
    narrow-language-markdown: {}
    narrow-language-other:
      exclude:
        - "*.nix"
        - "*.sh"
        - "*.bats"
        - "*.py"
        - "*.rb"
        - "*.js"
        - "*.jsx"
        - "*.ts"
        - "*.tsx"
        - "*.erb"
        - "*.hcl"
        - "*.tf"
        - "*.css"
        - "*.scss"
        - "*.md"
        - "*.dic"
        - "flake.lock"
    ascii-only:
      exclude:
        - "SPEC.md"
        - "flake.lock"
    tdd-order-bats:
      env:
        LEFTHOOK_TDD_SPEC_DIR: tests/unit
        LEFTHOOK_TDD_SRC_STRIP: ""
    execute-permissions:
      env:
        LEFTHOOK_EXECUTE_PERMISSIONS_ALLOWED: '^(\\./)?scripts/|^(\\./)?bin/'
    linter-coverage:
      skip: true
    bats-unit:
      timeout: 180s
      run: bats --recursive --jobs $(nproc) tests/unit
    flake-nix-build:
      timeout: 300s
      run: bats tests/integration/build.bats
