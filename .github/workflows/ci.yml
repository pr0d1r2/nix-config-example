name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: pr0d1r2/nix-lefthook-ci-action@370146001466273661fd8f8913ededc80f590b09
        with:
          skip-build: "true"
          keep-home: "true"
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

  build-darwin:
    needs: build-linux
    runs-on: macos-latest
    steps:
      - uses: pr0d1r2/nix-lefthook-ci-action@370146001466273661fd8f8913ededc80f590b09
        with:
          skip-build: "true"
          keep-home: "true"
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

  build-linux-arm:
    needs: build-linux
    runs-on: ubuntu-latest
    steps:
      - name: Set up QEMU for aarch64
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq qemu-user-static binfmt-support
          sudo update-binfmts --enable qemu-aarch64

      - uses: pr0d1r2/nix-lefthook-ci-action@370146001466273661fd8f8913ededc80f590b09
        with:
          skip-build: "true"
          keep-home: "true"
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          pre-build-commands: |
            echo "extra-platforms = aarch64-linux" | sudo tee -a /etc/nix/nix.conf
            sudo systemctl restart nix-daemon
